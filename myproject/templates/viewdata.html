<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</head>
<body>
    {% include 'nav.html' %}
    <h1>Registered Student</h1>
    <table class="table table-striped table-bordered">
        <tr>
            <th>ID</th>
            <th>Fullname</th>
            <th>Email</th>
            <th>Password</th>
            <th>Contact</th>
            <th>Address</th>
            <th>Action</th>
        </tr>
        {%for i in data%}
        <tr>
            <td>{{i.id}}</td>
            <td>{{i.fullname}}</td>
            <td>{{i.email}}</td>
            <td>{{i.password}}</td>
            <td>{{i.contact}}</td>
            <td>{{i.address}}</td>
            <td>
            <!-- <a href="deletestudent/{{i.id}}" class="btn btn-danger">Delete</a> -->
            <a href="deletestudent?id={{i.id}}" class="btn btn-danger">Delete</a>

            <!-- <a href="updatestudent/{{i.id}}" class="btn btn-success">Update</a> -->
            <a href="updatestudent?id={{i.id}}" class="btn btn-success">Update</a></td> 
            </td>
        </tr>
        {%endfor%}
    </table>
    
</body>
</html>
