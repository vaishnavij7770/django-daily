<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</head>
<body>
    {% include 'nav.html' %}
    
    <center>
        <h1>update Form</h1>
        <form method="post" action="profileupdate">
        {%csrf_token%}
        {%for i in data%}
        <input type="hidden" name="id" value="{{i.id}}">
        <input type="text" name="fullname" placeholder="Enter fullname" value="{{i.fullname}}"><br><br>
        <input type="email" name="email" placeholder="Enter email" value="{{i.email}}"><br><br>
        <input type="password" name="password" placeholder="Enter password" value="{{i.password}}"><br><br>
        <input type="text" name="contact" placeholder="Enter contact number" value="{{i.contact}}"><br><br>
        <input type="text" name="address" placeholder="Enter address"value="{{i.address}}"><br><br>
        <button type="submit" class="btn btn-primary">Update</button>
        {%endfor%}
    </form>
    </center>
    
</body>
</html>
